name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Verify dependencies are on module proxy
        run: GOPROXY=https://proxy.golang.org go mod download -x

      - name: Build
        run: go build -o edr .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
