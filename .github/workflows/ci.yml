name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Verify dependencies are on module proxy
        run: GOPROXY=https://proxy.golang.org go mod download -x

      - name: Build
        run: go build -o edr .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Benchmarks
        run: go test ./bench/ -bench . -benchmem -count=1 -run '^$' -timeout 300s | tee bench_output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench_output.txt
