name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build -o edr .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Benchmarks
        run: go test ./bench/ -bench . -benchmem -count=1 -run '^$' -timeout 300s | tee bench_output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.os }}
          path: bench_output.txt

  install-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test clean install via Dockerfile
        run: docker build -t edr-test-setup .

  install-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test clean install via setup.sh
        run: |
          mkdir /tmp/target && cd /tmp/target && git init -q
          ${{ github.workspace }}/setup.sh /tmp/target

      - name: Verify edr works
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          edr --version
          edr init -r /tmp/target
